<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat SLM</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="layout">
    <section class="chat-panel">
      <header class="panel-header">
        <h1>Chat SLM</h1>
        <p>Conversación local para planificar el pick and place.</p>
      </header>

      <div id="messages" class="messages"></div>

      <form id="chat-form" class="chat-form">
        <input
          id="chat-input"
          type="text"
          placeholder="Escribe una orden, por ejemplo: coge el cubo rojo"
          autocomplete="off"
        >
        <button type="submit">Enviar</button>
      </form>
    </section>

    <aside class="side-panel">
      <section class="status-card">
        <h2>Estado del robot</h2>
        <p id="status-text">Esperando eventos del sistema.</p>
      </section>

      <section class="status-card">
        <h2>Objetos visibles</h2>
        <ul id="objects-list" class="objects-list"></ul>
      </section>
    </aside>
  </main>

  <script src="/app.js"></script>
</body>
</html>
