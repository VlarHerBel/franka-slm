# Dimensiones alineadas con collision en model.sdf de gazebo_ycb (aprox. AABB en suelo).
# spawn_height_m: mitad de altura con contacto en z=0 del link; spawn_z_offset_m corrige mallas.
# visual_offset_* y visual_yaw_offset_rad: corrigen el desfase entre frame del link y visual/collision.
# footprint_width_m/footprint_length_m: huella para OBB/colocación cuando no coincide con width/length.
# allow_lying: false evita pitch~90° (objetos que ruedan, flotan o desajustan etiquetas).
# enabled: false excluye la clase del dataset final y la renumera automáticamente.
classes:
  - name: cracker_box
    class_id: 0
    model_name: cracker_box
    width_m: 0.060
    length_m: 0.158
    height_m: 0.210
    spawn_height_m: 0.105
    visual_offset_x_m: 0.0
    visual_offset_y_m: 0.0
    visual_offset_z_m: 0.0
    visual_yaw_offset_rad: 0.0
    footprint_width_m: 0.060
    footprint_length_m: 0.158
    allow_lying: false

