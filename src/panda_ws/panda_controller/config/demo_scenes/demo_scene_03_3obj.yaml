scene_id: demo_scene_03_3obj
description: "demo_scene_03 sin mustard_bottle (3 objetos, poses asentadas)"

pick_order:
  - cracker_box
  - chips_can
  - sugar_box

objects:
  cracker_box:
    role: target_first
    pose:
      x: 0.518
      y: -0.177
      yaw: -2.9986
    preferred_slot: 0

  chips_can:
    role: obstacle_then_target
    pose:
      x: 0.571
      y: 0.167
      yaw: 0.7116
    preferred_slot: 1
    seed: 1004

  sugar_box:
    role: obstacle_then_target
    pose:
      x: 0.655
      y: 0.054
      yaw: -1.9860
    preferred_slot: 2

transport_policy:
  forbidden_waypoints_when_obstacles_remaining:
    - carry_front_high

  local_exit_candidates:
    - rear_retreat_x_negative
    - rear_retreat_x_negative_slight_raise
    - vertical_raise_then_rear_retreat
    - rear_retreat_x_negative_far
    - rear_retreat_x_negative_raise_far

  reconfiguration_waypoints:
    - transport_ready_unwind
    - carry_mid_high

  transport_route:
    - carry_mid_high
    - turn_back_extended_aligned
    - box_front_high
    - box_high

  backend: direct_action
  validate_attached_swept_volume: true
  defer_named_hub_to_deterministic_transport: true
  use_lateral_transport_corridors: false

safety:
  obstacle_disturbance_xy_threshold_m: 0.010
  obstacle_disturbance_z_threshold_m: 0.020
  attached_transport_safety_margin_tolerance_m: 0.006
  reconfiguration_min_table_clearance_m: 0.200
  reconfiguration_min_xy_clearance_m: 0.080

transport_phases:
  local_escape:
    - carry_safe_height
    - rear_retreat_x_negative
    - rear_retreat_x_negative_slight_raise
    - vertical_raise_then_rear_retreat
    - rear_retreat_x_negative_far
    - rear_retreat_x_negative_raise_far
  reconfiguration:
    requires_zone_ok: true
    backend: direct_action
    waypoints:
      - transport_ready_unwind
      - carry_mid_high
  global_transport:
    backend: direct_action
    waypoints:
      - carry_mid_high
      - turn_back_extended_aligned
      - box_front_high
      - box_high

place_policy:
  slot_mode: ordered_near_to_far
  use_food_safe_dynamic_release_z: true
